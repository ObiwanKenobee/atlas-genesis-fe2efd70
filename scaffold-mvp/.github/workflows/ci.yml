name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Backend: install deps
        working-directory: scaffold-mvp/backend
        run: |
          npm ci

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres" >> $GITHUB_ENV

      - name: Backend: run migrations
        working-directory: scaffold-mvp/backend
        run: npm run migrate

      - name: Frontend: install deps and build
        working-directory: scaffold-mvp/frontend
        run: |
          npm ci
          npm run build || echo "frontend build skipped if vite missing"

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Compile contracts (placeholder)
        working-directory: scaffold-mvp/contracts
        run: |
          npm ci || true
          echo "Compile contracts (hardhat) here"
