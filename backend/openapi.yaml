openapi: 3.0.3
info:
  title: Atlas Genesis API
  version: '2.0.0'
  description: Basic OpenAPI spec for Atlas Genesis backend.
servers:
  - url: http://localhost:3001
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api:
    get:
      summary: API root
      responses:
        '200':
          description: API root with endpoints
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
