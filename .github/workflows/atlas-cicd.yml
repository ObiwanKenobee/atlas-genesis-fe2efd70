# Atlas Humanitarian Platform - CI/CD Pipeline
name: Atlas CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# WORKFLOW TRIGGERS
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.json'
      - 'Dockerfile*'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# ─────────────────────────────────────────────────────────────────────────────
# CONCURRENCY
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────
env:
  REGISTRY: 123456789.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: atlas-api
  EKS_CLUSTER: atlas-production
  AWS_REGION: us-east-1

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CODE QUALITY
  # ─────────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          npm ci
          cd ../atlas-sanctum-earth2studio
          pip install -e .
      
      - name: Linting
        run: |
          cd backend
          npm run lint
        continue-on-error: true
      
      - name: Type Checking
        run: |
          cd backend
          npm run type-check
      
      - name: Unit Tests
        run: |
          cd backend
          npm run test:unit -- --coverage --passWithNoTests
      
      - name: Security Audit
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript,typescript
          queries: security-extended

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD AND TEST
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 45
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and tag image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}
          load: true
      
      - name: Run integration tests
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e REDIS_URL=${{ secrets.REDIS_URL }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            npm run test:integration
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Push image to ECR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY TO STAGING
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.atlas.org
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28'
      
      - name: Update Kubernetes manifests
        run: |
          sed -i 's|image: 123456789.dkr.ecr.us-east-1.amazonaws.com/atlas-api:.*|image: 123456789.dkr.ecr.us-east-1.amazonaws.com/atlas-api:${{ github.sha }}|' infrastructure/kubernetes/deployments/api.yaml
      
      - name: Deploy to EKS
        uses: aws-actions/amazon-eks-update-kubeconfig@v1
        with:
          cluster-name: ${{ env.EKS_CLUSTER }}
          kubectl-version: 'v1.28'
      
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/atlas-api \
            atlas-api=123456789.dkr.ecr.us-east-1.amazonaws.com/atlas-api:${{ github.sha }} \
            -n atlas-staging \
            --record
          
          kubectl rollout status deployment/atlas-api -n atlas-staging --timeout=10m
      
      - name: Run health check
        run: |
          curl -f https://staging-api.atlas.org/health || exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY TO PRODUCTION
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://atlas.org
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28'
      
      - name: Update Kubernetes manifests
        run: |
          sed -i 's|image: 123456789.dkr.ecr.us-east-1.amazonaws.com/atlas-api:.*|image: 123456789.dkr.ecr.us-east-1.amazonaws.com/atlas-api:${{ github.sha }}|' infrastructure/kubernetes/deployments/api.yaml
      
      - name: Deploy to EKS
        uses: aws-actions/amazon-eks-update-kubeconfig@v1
        with:
          cluster-name: ${{ env.EKS_CLUSTER }}
          kubectl-version: 'v1.28'
      
      - name: Create Kubernetes rollout annotation
        run: |
          echo "Deploying version ${{ github.sha }} to production"
      
      - name: Blue/Green Deployment
        run: |
          # Create new version
          kubectl set image deployment/atlas-api \
            atlas-api=123456789.dkr.ecr.us-east-1.amazonaws.com/atlas-api:${{ github.sha }} \
            -n atlas-production \
            --record
          
          # Wait for rollout
          kubectl rollout status deployment/atlas-api -n atlas-production --timeout=15m
          
          # Health check
          curl -f https://api.atlas.org/health || exit 1
          
          # Smoke tests
          kubectl run smoke-test --image=curlimages/curl --restart=Never -- \
            curl -f https://api.atlas.org/api/v1/health && \
            echo "Smoke test passed" && \
            kubectl delete pod smoke-test -n atlas-production

  # ─────────────────────────────────────────────────────────────────────────────
  # POST-DEPLOYMENT
  # ─────────────────────────────────────────────────────────────────────────────
  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'
    
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: 'Production deployment completed successfully!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
      
      - name: Create deployment snapshot
        run: |
          echo "Deployment completed at $(date)" > deployment-snapshot.txt
          echo "Commit: ${{ github.sha }}" >> deployment-snapshot.txt
          echo "Author: ${{ github.actor }}" >> deployment-snapshot.txt
      
      - name: Update release notes
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  # ─────────────────────────────────────────────────────────────────────────────
  # SECURITY SCAN (Scheduled)
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'scheduled-trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'scheduled-trivy-results.sarif'
