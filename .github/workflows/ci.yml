name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Lint · Typecheck · Build · Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vite production build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Install puppeteer for smoke test
        run: npm install --no-save puppeteer

      - name: Start preview server
        run: |
          npx vite preview --port 4173 &
          npx wait-on http://localhost:4173

      - name: Route smoke test
        run: npm run smoke -- http://localhost:4173
