version: 2
updates:
  # Root frontend
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  # Backend
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10

  # Atlas Sanctum web app
  - package-ecosystem: npm
    directory: /atlas-sanctum/apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 3
