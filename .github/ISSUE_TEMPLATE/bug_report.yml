name: Bug Report
description: Report a bug in Atlas Sanctum
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below as completely as possible.
        
        **Security vulnerabilities must not be reported here.** See [SECURITY.md](../SECURITY.md) for the responsible disclosure process.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production (atlassanctum.org)
        - Staging
        - Local development
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Runtime
      placeholder: "Chrome 125, Firefox 126, Node 20.x, etc."

  - type: input
    id: version
    attributes:
      label: Platform version
      placeholder: "v2.0.0 or commit SHA"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant console errors, network responses, or log output.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or any other context.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am not reporting a security vulnerability (see SECURITY.md)
          required: true
