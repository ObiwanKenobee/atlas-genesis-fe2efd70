services:
  - type: web
    name: atlas-genesis-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-genesis-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://atlas-genesis-fe2efd70-4x9v.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://atlas-genesis-fe2efd70-4x9v.vercel.app
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true

  - type: web
    name: atlas-genesis-frontend
    runtime: static
    region: oregon
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://atlas-genesis-backend.onrender.com/api

databases:
  - name: atlas-genesis-db
    plan: free
    databaseName: atlas_genesis
    user: atlas
