syntax = "proto3";
package sanctum.rewards.v1;

option go_package = "github.com/atlashumanitarian/sanctum/x/rewards/types";

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

message RewardDistribution {
  string impact_id        = 1;
  string provider         = 2;
  string provider_amount  = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
  string oracle_amount    = 4 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
  string treasury_amount  = 5 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
  string denom            = 6;
  int64  distributed_at   = 7;
}

message MsgDistributeRewards {
  string signer    = 1;
  string impact_id = 2;
}

message MsgDistributeRewardsResponse {
  repeated cosmos.base.v1beta1.Coin distributed = 1 [(gogoproto.nullable) = false];
}

message GenesisState {
  repeated RewardDistribution distributions = 1;
  string treasury_address = 2;
}

message EventRewardsDistributed {
  string impact_id       = 1;
  string provider        = 2;
  string provider_amount = 3;
  string oracle_amount   = 4;
  string treasury_amount = 5;
  string denom           = 6;
}
